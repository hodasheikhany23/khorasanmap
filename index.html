<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نقشه خراسان رضوی</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="assets/css/bootstrap.rtl.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />

</head>
<body>

    <header class="page-header">
        <div class="header-content d-flex align-items-center w-100">
            <div class="header-search">
                <div class="input-group input-group-sm">
                    <input type="text" id="searchInput" class="form-control" placeholder="جست‌وجوی شهر..." aria-label="جست‌وجوی شهر">
                    <button class="btn btn-primary" type="button" id="searchButton">
                        جستجو
                    </button>
                </div>
            </div>
        </div>
    </header>


    <div id="map"></div>

    <div class="offcanvas offcanvas-end show" data-bs-backdrop="false" data-bs-scroll="true" tabindex="-1" id="infoSidebar" aria-labelledby="sidebarTitle">

        <div class="offcanvas-header">
            <h3 class="offcanvas-title" id="sidebarTitle">نقشه خراسان رضوی</h3>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>

        <div class="offcanvas-body" id="sidebarBody">
            <div class="welcome-icon">📍</div>
            <h6>به نقشه خراسان رضوی خوش آمدید</h6>
            <p class="text-muted">
                برای مشاهده جزئیات هر مکان، روی یکی از نشانگرهای روی نقشه کلیک کنید.
            </p>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
